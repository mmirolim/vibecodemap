    name: Uncovered executable lines
    value_type: number
    unit: lines
    direction: higher_is_risk
    aggregation: { default: sum, allowed: [sum, max, distribution] }

  - id: change.lines_changed_18m
    name: Lines changed in 18 months
    value_type: number
    unit: lines
    direction: contextual
    aggregation: { default: sum, allowed: [sum, max, distribution] }

  - id: effects.mutating_sites
    name: Detected mutating side-effect sites
