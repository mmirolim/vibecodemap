layout_profiles:
  - id: layout.software-landscape.v0
    hierarchy: [system, deployable, component, artifact, symbol]
    stable_coordinates: true
    footprint: code.lines.physical
    height: complexity.cyclomatic.max
    scale: { footprint: sqrt_clamped, height: log2 }
    unknown_geometry: neutral
    effect_contact:
      metric: effects.mutating_sites
      direct: grounded_with_roof_sphere
      none_detected: floating_translucent_with_ground_shadow
      transitive_policy: typed_path_to_resource

lenses:
  - id: lens.review-priority
    question: Where should a reviewer investigate first, and why?
    layout: layout.software-landscape.v0
    heat: { source: priority.static-review.v0, scale: percentile }
    legend:
      name: Review priority
      low_label: lower relative priority
      high_label: higher relative priority
      caveat: Prioritization for investigation, not a quality verdict.
    detail: [factors, raw_values, provenance, source_refs]
    lod:
      - { level: 0, subjects: package, aggregation: max_priority }
      - { level: 1, subjects: artifact, aggregation: none }
      - { level: 2, subjects: symbol, edges: bounded_selected_ego }

  - id: lens.coverage-evidence
    question: Where is test execution evidence weak, missing, or stale?
    layout: layout.software-landscape.v0
    heat: { metric: test.line_coverage, invert: true }
    legend:
      name: Missing coverage
      low_label: 0% uncovered
      high_label: 100% uncovered
      caveat: Unknown and stale reports remain separate from the heat scale.
    marker: { status: [unknown, stale], shape: cone }
    unknown_policy: visibly_separate

  - id: lens.mutating-effects
    question: Where are state-changing effects concentrated?
    layout: layout.software-landscape.v0
    heat: { metric: effects.mutating_sites, scale: within_scan_percentile }
    legend:
      name: Direct mutating effects
      low_label: none directly detected
      high_label: scan maximum
      caveat: No direct site does not imply transitive purity.
    marker: { when: value_gt_zero, shape: sphere }

  - id: lens.coupling
    question: Which artifacts combine high dependency reach with local complexity?
    layout: layout.software-landscape.v0
    heat: { metric: coupling.fan_in_plus_out, scale: within_scan_percentile }
    legend:
      name: Static coupling
      low_label: fewer internal links
      high_label: more internal links
      caveat: Dynamic dispatch may be unresolved.
    edges:
      macro: bundled_by_visible_parent
      detail: bounded_selected_ego
      maximum_outgoing: 7
      maximum_incoming: 4
