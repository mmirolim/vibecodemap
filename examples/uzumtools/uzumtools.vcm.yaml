architecture:
  styles:
    - id: style.modular-monolith
      scope: deployable.flask-web
      name: Modular monolith
      fit: primary
      summary: One Flask deployable contains interface, service, data, and infrastructure modules connected by in-process calls.
      exceptions:
        - The API blueprint concentrates several unrelated feature boundaries and substantial orchestration.
        - Image lifecycle code still assumes local paths in important flows despite storage adapters.
      evidence:
        - { artifact: file.app.init, lines: [16, 112], role: implementation, supports: One application factory registers all server modules. }
        - { artifact: file.app.views.api, lines: [1, 3649], role: implementation, supports: One deployable API boundary reaches all major services. }
      generated: *ai_high

    - id: style.layered-service
      scope: deployable.flask-web
      name: Layered service architecture
      fit: partial
      summary: Blueprints generally call services and services use ORM models, but major route handlers still own business workflow and persistence decisions.
      exceptions:
        - analyze_with_ai, enhance_image, background upload, and Paycom callback contain long cross-service workflows.
      evidence:
        - { artifact: file.agents, lines: [33, 48], role: contract, supports: The declared structure assigns business logic to services. }
        - { artifact: file.agents, lines: [141, 141], role: contract, supports: The guide says view functions should remain thin. }
        - { artifact: file.app.views.api, lines: [483, 872], role: implementation, supports: "AI route coordinates validation, storage, billing, provider, analysis, and jobs." }
      generated: *ai_high

    - id: style.mvc-like
      scope: system.photochecker
      name: MVC-like server-rendered web architecture
      fit: supporting
      summary: SQLAlchemy models, Flask route controllers, and Jinja templates form an MVC-like base augmented by large stateful browser controllers.
      exceptions:
        - Browser JavaScript implements substantial application workflow and client ML, so this is not classic server-only MVC.
      evidence:
        - { artifact: file.app.models, lines: [1, 548], role: implementation, supports: ORM models define durable state. }
        - { artifact: file.app.views.main, lines: [47, 56], role: implementation, supports: Controllers render Jinja templates. }
        - { artifact: file.app.static.tool, lines: [1, 2425], role: implementation, supports: Browser code owns substantial interaction state. }
      generated: *ai_high

    - id: style.strategy-adapters
      scope: layer.application-services
      name: Strategy and adapter patterns
      fit: supporting
      summary: Enhancement strategies and storage backends expose explicit polymorphic contracts with selectable implementations.
      evidence:
        - { artifact: file.app.services.enhancement.core, lines: [47, 63], role: contract, supports: EnhancementStrategy defines the strategy contract. }
        - { artifact: file.app.services.storage.base, lines: [12, 97], role: contract, supports: StorageBackend defines the adapter contract. }
      generated: *ai_high

  constraints:
    - id: constraint.thin-routes
      scope: layer.server-interfaces
      statement: Route handlers should remain thin and business logic should live in services.
      severity: warning
      enforcement: review
      evidence:
        - { artifact: file.agents, lines: [141, 141], role: contract, supports: The repository guide states this rule directly. }

    - id: constraint.storage-portability
      scope: component.storage-adapters
      statement: Application flows intended to support cloud storage should use storage-relative keys and the StorageBackend contract rather than absolute local paths.
      severity: warning
      enforcement: review
      evidence:
        - { artifact: file.config, lines: [105, 110], role: contract, supports: "Local, GCS, and S3 backends are declared deployment options." }
        - { artifact: file.app.views.api, lines: [355, 358], role: evidence, supports: The source records the current absolute-path limitation. }

findings:
  - id: finding.api-responsibility-concentration
    kind: responsibility_concentration
    severity: high
    summary: The 3,649-line API module owns at least analysis, enhancement, downloads, job history, edge upload, billing, Paycom callback, cleanup, and payment statistics.
    subjects: [component.api-blueprint, file.app.views.api]
    impact: Unrelated changes converge on one module and route layer, increasing review cost and making feature boundaries difficult to see or enforce.
    evidence:
      - { artifact: file.app.views.api, lines: [291, 3649], role: evidence, supports: Route definitions span all listed feature families. }
    generated: *ai_high

  - id: finding.frontend-responsibility-concentration
    kind: responsibility_concentration
    severity: warning
    summary: The 2,425-line main browser script combines upload, analysis, result rendering, enhancement, localization, account state, capability detection, and edge-ML workflow.
    subjects: [component.tool-ui, file.app.static.tool]
    impact: UI feature changes share implicit mutable state and a large review surface even though the backend is divided into services.
    evidence:
      - { artifact: file.app.static.tool, lines: [1, 2425], role: evidence, supports: Endpoint calls and state-management sections for all listed concerns are present. }
    generated: *ai_high

  - id: finding.dangling-analytics-call
    kind: dangling_interaction
    severity: warning
    summary: Landing analytics calls /api/analytics, but no matching Flask route exists in the complete scoped route inventory.
    subjects: [component.landing-ui, expected.endpoint.analytics, relation.landing-to-missing-analytics]
    impact: Analytics events are silently discarded, and the client-server contract appears more complete than it is.
    evidence:
      - { artifact: file.app.static.landing, lines: [201, 218], role: evidence, supports: The explicit fetch target is /api/analytics. }
      - { artifact: file.app.views.api, lines: [1, 3649], role: evidence, supports: No route registers that path. }
      - { artifact: file.app.views.main, lines: [1, 281], role: evidence, supports: No route registers that path. }
    generated:
      method: ai_inferred
      confidence: high
      rationale: Direct client URL comparison against all scoped Flask route decorators yields no match.

  - id: finding.ai-work-is-inline
    kind: hidden_synchronous_work
    severity: warning
    summary: AI analysis and Gemini enhancement execute synchronously inside Gunicorn request threads despite durable records being named jobs.
    subjects: [operation.api.ai-analysis, operation.api.enhance-image, component.ai-analysis, component.jobs]
    impact: Provider latency and image processing occupy request capacity; job status does not provide queue isolation, retries, or independent completion.
    evidence:
      - { artifact: file.app.views.api, lines: [664, 668], role: evidence, supports: AIAnalyzer is called directly in the route. }
      - { artifact: file.app.services.ai.gemini, lines: [83, 88], role: evidence, supports: The synchronous SDK call returns before the route proceeds. }
      - { artifact: file.app.services.job, lines: [32, 141], role: evidence, supports: Job methods only persist and commit records. }
      - { artifact: file.gunicorn, lines: [15, 31], role: configuration, supports: Request concurrency is based on gthread workers. }
    generated: *ai_high

  - id: finding.storage-abstraction-partial
    kind: abstraction_bypass
    severity: warning
    summary: A storage-port abstraction exists, but important API and lifecycle paths persist and resolve absolute local filesystem paths.
    subjects: [component.storage-adapters, component.image-lifecycle, resource.image-storage]
    impact: Configuring GCS or S3 does not by itself guarantee that upload, asset, and download flows are portable.
    evidence:
      - { artifact: file.app.views.api, lines: [350, 360], role: evidence, supports: A source TODO states that an absolute local path is stored. }
      - { artifact: file.app.views.api, lines: [2448, 2465], role: evidence, supports: Download logic contains a cloud-storage TODO. }
      - { artifact: file.app.services.storage.base, lines: [12, 97], role: contract, supports: The intended generalized storage operations exist. }
    generated: *ai_high

  - id: finding.process-local-enhancement-limit
    kind: shared_state_risk
    severity: warning
    summary: Enhancement daily limits are stored in an in-memory dictionary owned by each orchestrator instance rather than a shared durable counter.
    subjects: [component.enhancement, process.flask-request-workers]
    impact: Limits can differ across worker processes, reset on restart, and race across request threads.
    evidence:
      - { artifact: file.app.services.enhancement.orchestrator, lines: [55, 61], role: evidence, supports: daily_usage is initialized as process memory. }
      - { artifact: file.app.services.enhancement.orchestrator, lines: [452, 479], role: evidence, supports: Checks and increments use the dictionary without shared persistence. }
      - { artifact: file.gunicorn, lines: [19, 24], role: configuration, supports: Deployment can run multiple processes and threads. }
    generated: *ai_high

