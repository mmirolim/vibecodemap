flows:
  - id: flow.technical-analysis
    name: Technical image analysis
    summary: Browser upload is stored, analyzed synchronously, recorded as a completed job, and returned in one request.
    trigger: operation.api.technical-analysis
    execution: *sync_request
    steps:
      - { id: request, relation: relation.tool-to-technical-api, next: [store] }
      - { id: store, relation: relation.technical-api-to-lifecycle, next: [analyze] }
      - { id: analyze, relation: relation.technical-api-to-image-analysis, next: [record] }
      - { id: record, relation: relation.technical-api-to-jobs, next: [persist] }
      - { id: persist, relation: relation.jobs-to-database }
    generated: *ai_high

  - id: flow.ai-analysis
    name: AI-assisted image analysis
    summary: Authenticated upload reserves credits, blocks on Gemini and technical analysis, settles billing, records results, and responds.
