      - { id: external, relation: relation.ai-analysis-to-gemini, next: [technical] }
      - { id: technical, relation: relation.ai-api-to-image-analysis, next: [record] }
      - { id: record, relation: relation.ai-api-to-jobs, next: [persist] }
      - { id: persist, relation: relation.jobs-to-database }
