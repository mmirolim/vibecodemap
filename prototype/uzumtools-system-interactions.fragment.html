<div id="vcm-system-interactions">
  <style>
    #vcm-system-interactions {
      width: 100%;
      color: var(--foreground);
    }
    #vcm-system-interactions .vcm-stage {
      position: relative;
      height: 540px;
      overflow: hidden;
      padding: 0;
    }
    #vcm-system-interactions svg {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      user-select: none;
    }
    #vcm-system-interactions .vcm-legend {
      margin: 0.4rem 0 0.55rem;
      gap: 0.35rem 0.75rem;
    }
    #vcm-system-interactions .vcm-key {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }
    #vcm-system-interactions .vcm-line-key {
      position: relative;
      display: inline-block;
      width: 1.8rem;
      height: 0;
      color: var(--viz-series-1);
      border-top: 2px solid currentColor;
    }
    #vcm-system-interactions .vcm-line-key::after {
      position: absolute;
      right: -1px;
      top: -5px;
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid currentColor;
      content: '';
    }
    #vcm-system-interactions .vcm-line-key.async {
      color: var(--viz-series-3);
      border-top-style: dashed;
    }
    #vcm-system-interactions .vcm-line-key.callback {
      color: var(--viz-series-5);
      border-top-style: dotted;
    }
    #vcm-system-interactions .vcm-line-key.state {
      color: var(--viz-series-4);
      border-top-width: 3px;
    }
    #vcm-system-interactions .vcm-node-key {
      display: inline-block;
      width: 0.75rem;
      height: 0.55rem;
      background: color-mix(in srgb, var(--viz-series-2) 24%, transparent);
      border: 1px solid var(--viz-series-2);
    }
    #vcm-system-interactions .vcm-node-key.external {
      transform: skewX(-18deg);
    }
    #vcm-system-interactions .vcm-node-key.state {
      border-radius: 50%;
      background: color-mix(in srgb, var(--viz-series-4) 24%, transparent);
      border-color: var(--viz-series-4);
    }
    #vcm-system-interactions .vcm-tooltip {
      position: absolute;
      display: none;
      max-width: 300px;
      pointer-events: none;
      z-index: 4;
    }
    #vcm-system-interactions .vcm-detail {
      margin-top: 0.75rem;
    }
    #vcm-system-interactions .vcm-detail-copy {
      flex: 1 1 30rem;
      min-width: 0;
    }
    #vcm-system-interactions .vcm-detail-copy code,
    #vcm-system-interactions .vcm-detail-copy span {
      overflow-wrap: anywhere;
    }
    #vcm-system-interactions .lane-shape {
      fill: color-mix(in srgb, var(--foreground) 4%, transparent);
      stroke: var(--border);
      stroke-width: 1.5;
    }
    #vcm-system-interactions .lane-label {
      fill: var(--muted-foreground);
      font-size: var(--font-size-base);
      font-weight: 500;
    }
    #vcm-system-interactions .edge-visible {
      fill: none;
      stroke-width: 2.2;
      opacity: 0.14;
      transition: opacity 160ms ease, stroke-width 160ms ease;
    }
    #vcm-system-interactions .edge-hit {
      fill: none;
      stroke: transparent;
      stroke-width: 14;
      pointer-events: stroke;
      cursor: pointer;
    }
    #vcm-system-interactions .edge.active .edge-visible {
      opacity: 0.94;
      stroke-width: 2.8;
    }
    #vcm-system-interactions .edge.inactive {
      opacity: 0;
      pointer-events: none;
    }
    #vcm-system-interactions .edge.sync .edge-visible {
      stroke: var(--viz-series-1);
      marker-end: url(#vcm-arrow-sync);
    }
    #vcm-system-interactions .edge.async .edge-visible {
      stroke: var(--viz-series-3);
      stroke-dasharray: 8 5;
      marker-end: url(#vcm-arrow-async);
    }
    #vcm-system-interactions .edge.callback .edge-visible {
      stroke: var(--viz-series-5);
      stroke-dasharray: 2 5;
      marker-end: url(#vcm-arrow-callback);
    }
    #vcm-system-interactions .edge.state .edge-visible {
      stroke: var(--viz-series-4);
      stroke-width: 3;
      marker-end: url(#vcm-arrow-state);
    }
    #vcm-system-interactions .node {
      cursor: pointer;
      transition: opacity 160ms ease;
    }
    #vcm-system-interactions .node.dim {
      opacity: 0.12;
      pointer-events: none;
    }
    #vcm-system-interactions .node .node-shape {
      fill: color-mix(in srgb, var(--viz-series-1) 14%, var(--background));
      stroke: color-mix(in srgb, var(--viz-series-1) 66%, var(--border));
      stroke-width: 1.5;
    }
    #vcm-system-interactions .node.operation .node-shape {
      fill: color-mix(in srgb, var(--viz-series-3) 13%, var(--background));
      stroke: color-mix(in srgb, var(--viz-series-3) 68%, var(--border));
    }
    #vcm-system-interactions .node.external .node-shape {
      fill: color-mix(in srgb, var(--viz-series-2) 14%, var(--background));
      stroke: color-mix(in srgb, var(--viz-series-2) 68%, var(--border));
    }
    #vcm-system-interactions .node.state .node-shape {
      fill: color-mix(in srgb, var(--viz-series-4) 14%, var(--background));
      stroke: color-mix(in srgb, var(--viz-series-4) 68%, var(--border));
    }
    #vcm-system-interactions .node.actor .node-shape {
      fill: color-mix(in srgb, var(--viz-series-6) 14%, var(--background));
      stroke: color-mix(in srgb, var(--viz-series-6) 68%, var(--border));
    }
    #vcm-system-interactions .node.missing .node-shape {
      fill: color-mix(in srgb, var(--destructive) 8%, var(--background));
      stroke: var(--destructive);
      stroke-dasharray: 5 4;
    }
    #vcm-system-interactions .node.selected .node-shape {
      stroke: var(--primary);
      stroke-width: 3.5;
    }
    #vcm-system-interactions .node-label {
      fill: var(--foreground);
      font-size: var(--font-size-base);
      font-weight: 500;
      pointer-events: none;
      text-anchor: middle;
    }
    #vcm-system-interactions .step-marker circle {
      fill: var(--primary);
      stroke: var(--primary-foreground);
      stroke-width: 1;
    }
    #vcm-system-interactions .step-marker text {
      fill: var(--primary-foreground);
      font-size: var(--font-size-base);
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: central;
    }
    #vcm-system-interactions .overview-edge-label {
      fill: var(--muted-foreground);
      stroke: var(--background);
      stroke-width: 4px;
      stroke-linejoin: round;
      paint-order: stroke fill;
      font-size: var(--font-size-base);
      text-anchor: middle;
      pointer-events: none;
    }
    @media (max-width: 520px) {
      #vcm-system-interactions .vcm-stage {
        height: 500px;
      }
      #vcm-system-interactions .vcm-key {
        white-space: normal;
      }
    }
  </style>

        { id:'overview.ai', from:'overview.flask', to:'overview.gemini', style:'sync', label:'2 blocking provider paths', labelX:600, labelY:130 },
        { id:'overview.edge', from:'overview.browser', to:'overview.edge-supply', style:'async', label:'runtime + model downloads', labelX:505, labelY:160 },
        { id:'overview.cache', from:'overview.browser', to:'overview.browser-cache', style:'state', label:'IndexedDB cache', labelX:290, labelY:365 },
        { id:'overview.checkout', from:'overview.browser', to:'overview.paycom', style:'async', label:'checkout redirect', labelX:500, labelY:335 },
        { id:'overview.callback', from:'overview.paycom', to:'overview.flask', style:'callback', label:'merchant callback', labelX:580, labelY:235 },
        { id:'overview.oauth', from:'overview.flask', to:'overview.identity', style:'sync', label:'OAuth / signed login', labelX:540, labelY:420 },
        { id:'overview.persist', from:'overview.flask', to:'overview.state', style:'state', label:'DB + images + counters', labelX:545, labelY:450 }
      ];

      const lanes = [
        { x:10, y:35, w:170, h:515, label:'Browser runtime' },
        { x:200, y:35, w:180, h:515, label:'HTTP / interface boundary' },
        { x:400, y:35, w:180, h:515, label:'Application services' },
        { x:600, y:35, w:230, h:515, label:'External systems + state' }
      ];

      const svgNS = 'http://www.w3.org/2000/svg';
      function element(name, attrs = {}) {
        const node = document.createElementNS(svgNS, name);
        Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
        return node;
      }

      function shapeFor(node) {
        if (node.kind === 'actor') return element('ellipse', { class:'node-shape', cx:node.x, cy:node.y, rx:node.w/2, ry:node.h/2 });
        if (node.kind === 'external') {
          const half = node.w / 2;
          const top = node.y - node.h / 2;
          const bottom = node.y + node.h / 2;
          return element('polygon', { class:'node-shape', points:`${node.x-half+12},${top} ${node.x+half-12},${top} ${node.x+half},${node.y} ${node.x+half-12},${bottom} ${node.x-half+12},${bottom} ${node.x-half},${node.y}` });
        }
        return element('rect', { class:'node-shape', x:node.x-node.w/2, y:node.y-node.h/2, width:node.w, height:node.h, rx:node.kind === 'state' ? node.h/2 : 8 });
      }

      function labelLines(name) {
        if (name.length <= 23) return [name];
        const words = name.split(' ');
        let first = '';
        let second = '';
        words.forEach(word => {
          if ((first + ' ' + word).trim().length <= 21 && !second) first = (first + ' ' + word).trim();
          else second = (second + ' ' + word).trim();
        });
        return second ? [first, second] : [name];
      }

      function drawNode(node, { dim = false, selected = false, overview = false } = {}) {
        const group = element('g', { class:`node ${node.kind} ${dim ? 'dim' : ''} ${selected ? 'selected' : ''}`, 'data-node':node.id });
        group.appendChild(shapeFor(node));
        const lines = labelLines(node.name);
        const text = element('text', { class:'node-label', x:node.x, y:node.y - (lines.length - 1) * 8 });
        lines.forEach((line, index) => {
          const span = element('tspan', { x:node.x, dy:index ? 16 : 0 });
          span.textContent = line;
          text.appendChild(span);
        });
        group.appendChild(text);
        group.addEventListener('pointerenter', event => showNodeTooltip(event, node, overview));
        group.addEventListener('pointermove', moveTooltip);
        group.addEventListener('pointerleave', hideTooltip);
        group.addEventListener('click', () => selectNode(node, overview));
        nodeLayer.appendChild(group);
      }

      function endpoints(from, to) {
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        if (Math.abs(dx) >= Math.abs(dy)) {
          return {
            start:{ x:from.x + Math.sign(dx) * from.w/2, y:from.y },
            end:{ x:to.x - Math.sign(dx) * to.w/2, y:to.y }
          };
        }
        return {
          start:{ x:from.x, y:from.y + Math.sign(dy) * from.h/2 },
          end:{ x:to.x, y:to.y - Math.sign(dy) * to.h/2 }
        };
      }

      function pathFor(from, to) {
        const { start, end } = endpoints(from, to);
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          return { d:`M ${start.x} ${start.y} C ${start.x + dx*0.42} ${start.y}, ${end.x - dx*0.42} ${end.y}, ${end.x} ${end.y}`, mid:{ x:(start.x+end.x)/2, y:(start.y+end.y)/2 } };
        }
        return { d:`M ${start.x} ${start.y} C ${start.x} ${start.y + dy*0.42}, ${end.x} ${end.y - dy*0.42}, ${end.x} ${end.y}`, mid:{ x:(start.x+end.x)/2, y:(start.y+end.y)/2 } };
      }

      function drawEdge(relation, from, to, active, step, label) {
        const curve = pathFor(from, to);
        const group = element('g', { class:`edge ${relation.style} ${active ? 'active' : 'inactive'}`, 'data-edge':relation.id });
        group.appendChild(element('path', { class:'edge-visible', d:curve.d }));
        const hit = element('path', { class:'edge-hit', d:curve.d });
        hit.addEventListener('pointerenter', event => showEdgeTooltip(event, relation, from, to));
        hit.addEventListener('pointermove', moveTooltip);
        hit.addEventListener('pointerleave', hideTooltip);
        hit.addEventListener('click', () => selectRelation(relation, from, to));
        group.appendChild(hit);
        edgeLayer.appendChild(group);

        if (step) {
          const marker = element('g', { class:'step-marker' });
          marker.appendChild(element('circle', { cx:curve.mid.x, cy:curve.mid.y, r:10 }));
          const number = element('text', { x:curve.mid.x, y:curve.mid.y });
          number.textContent = step;
          marker.appendChild(number);
          stepLayer.appendChild(marker);
        } else if (label && active) {
          const text = element('text', { class:'overview-edge-label', x:relation.labelX ?? curve.mid.x, y:relation.labelY ?? curve.mid.y - 7 });
          text.textContent = label;
          stepLayer.appendChild(text);
        }
      }

      function drawLanes() {
        lanes.forEach(lane => {
          laneLayer.appendChild(element('rect', { class:'lane-shape', x:lane.x, y:lane.y, width:lane.w, height:lane.h, rx:10 }));
          const label = element('text', { class:'lane-label', x:lane.x+10, y:lane.y+20 });
          label.textContent = lane.label;
          laneLayer.appendChild(label);
        });
      }

      function clearDiagram() {
        laneLayer.replaceChildren();
        edgeLayer.replaceChildren();
        stepLayer.replaceChildren();
        nodeLayer.replaceChildren();
      }

      function relationNodes(relationIds) {
        const ids = new Set();
        relationIds.forEach(id => {
          const relation = relationById.get(id);
          if (relation) { ids.add(relation.from); ids.add(relation.to); }
        });
        return ids;
      }

      let selected = null;
      let focus = 'overview';
      let viewBox = { x:0, y:0, w:840, h:560 };

      function renderOverview() {
        clearDiagram();
        const map = new Map(overviewNodes.map(node => [node.id, node]));
        overviewEdges.forEach(edge => drawEdge(edge, map.get(edge.from), map.get(edge.to), true, null, edge.label));
        overviewNodes.forEach(node => drawNode(node, { selected:selected?.id === node.id, overview:true }));
        accessibleSummary.textContent = 'System overview: seller to browser, browser to Flask APIs, browser to model supply and Paycom, Paycom callback to Flask, Flask to Gemini, identity providers, and durable state.';
        updateDetail({ name:'System interaction overview', kind:'aggregated deployables', summary:'The browser and Flask application are separate runtimes. Browser calls are asynchronous from the UI, but the mapped Flask analysis, provider, storage, and database work is performed inline on request threads.', path:null });
      }

      function renderDetailed(mode, id) {
        clearDiagram();
        drawLanes();
        let activeRelations = new Set(relations.map(relation => relation.id));
        let activeNodes = new Set(nodes.map(node => node.id));
        let stepByRelation = new Map();
        let summary = 'All 33 typed relations. Select a flow or component to remove unrelated edges.';

        if (mode === 'flow') {
          const flow = flowById.get(id);
          activeRelations = new Set(flow.relations);
          activeNodes = relationNodes(flow.relations);
          stepByRelation = new Map(flow.relations.map((relationId, index) => [relationId, index + 1]));
          summary = flow.summary;
          updateDetail({ name:flow.name, kind:'end-to-end flow', summary:flow.summary, path:null });
        } else if (mode === 'node') {
          const node = nodeById.get(id);
          const ego = relations.filter(relation => relation.from === id || relation.to === id);
          activeRelations = new Set(ego.map(relation => relation.id));
          activeNodes = relationNodes([...activeRelations]);
          activeNodes.add(id);
          summary = `${node.name}: ${ego.filter(r => r.to === id).length} incoming and ${ego.filter(r => r.from === id).length} outgoing mapped relations.`;
          selected = node;
          updateDetail(node);
        }

        relations.forEach(relation => {
          const from = nodeById.get(relation.from);
          const to = nodeById.get(relation.to);
          drawEdge(relation, from, to, activeRelations.has(relation.id), stepByRelation.get(relation.id));
        });
        nodes.forEach(node => drawNode(node, { dim:!activeNodes.has(node.id), selected:selected?.id === node.id }));
        accessibleSummary.textContent = summary;
      }

      function render() {
        const [mode, id] = focus.split(':');
        if (mode === 'overview') renderOverview();
        else renderDetailed(mode, id);
      }

      function selectNode(node, overview) {
        selected = node;
        if (overview) {
          renderOverview();
          updateDetail(node);
          return;
        }
        focus = `node:${node.id}`;
        focusSelect.value = focus;
        render();
      }

      function selectRelation(relation, from, to) {
        selected = relation;
        updateDetail({
          name:`${from.name} → ${to.name}`,
          kind:`${relation.style} relation`,
          summary:`${relation.execution}; trigger: ${relation.trigger}.`,
          path:from.path,
          line:from.line
        });
        root.querySelectorAll('.node').forEach(node => node.classList.toggle('selected', node.dataset.node === from.id || node.dataset.node === to.id));
      }

      function updateDetail(item) {
        detailTitle.textContent = item.name;
        detailKind.textContent = item.kind ? `· ${item.kind.replaceAll('_',' ')}` : '';
        detailCopy.textContent = item.summary || '';
        const source = item.path ? `${basePath}${item.path}:${item.line || 1}` : '';
        detailSource.textContent = source;
        openButton.disabled = !source;
        openButton.dataset.path = item.path || '';
        openButton.dataset.line = item.line || 1;
      }

      function showNodeTooltip(event, node, overview) {
        tooltip.textContent = `${node.name} · ${node.kind.replaceAll('_',' ')}${overview ? '' : ' · click to isolate its mapped interactions'}`;
        tooltip.style.display = 'block';
        moveTooltip(event);
      }

      function showEdgeTooltip(event, relation, from, to) {
        tooltip.textContent = `${from.name} → ${to.name} · ${relation.execution || relation.label} · ${relation.style}`;
        tooltip.style.display = 'block';
        moveTooltip(event);
      }

      function moveTooltip(event) {
        const bounds = stage.getBoundingClientRect();
        const left = Math.min(event.clientX - bounds.left + 12, stage.clientWidth - 312);
        const top = Math.max(8, event.clientY - bounds.top - 40);
        tooltip.style.left = `${Math.max(8, left)}px`;
        tooltip.style.top = `${top}px`;
      }

      function hideTooltip() {
        tooltip.style.display = 'none';
      }

      const overviewGroup = document.createElement('optgroup');
      overviewGroup.label = 'Architecture';
      [{ value:'overview', label:'System overview' }, { value:'all:', label:'All component interactions' }].forEach(item => {
        const option = document.createElement('option');
        option.value = item.value;
        option.textContent = item.label;
        overviewGroup.appendChild(option);
      });
      focusSelect.appendChild(overviewGroup);

      const flowGroup = document.createElement('optgroup');
      flowGroup.label = 'End-to-end flows';
      flows.forEach(flow => {
        const option = document.createElement('option');
        option.value = `flow:${flow.id}`;
        option.textContent = flow.name;
        flowGroup.appendChild(option);
      });
      focusSelect.appendChild(flowGroup);

      const componentGroup = document.createElement('optgroup');
      componentGroup.label = 'Components, systems, and resources';
      nodes.sort((a,b) => a.name.localeCompare(b.name)).forEach(node => {
        const option = document.createElement('option');
        option.value = `node:${node.id}`;
        option.textContent = node.name;
        componentGroup.appendChild(option);
      });
      focusSelect.appendChild(componentGroup);

      focusSelect.value = focus;
      focusSelect.addEventListener('change', () => {
        focus = focusSelect.value;
        selected = null;
        render();
      });

      function setViewBox(next) {
        viewBox = next;
        svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
      }
      fitButton.addEventListener('click', () => setViewBox({ x:0, y:0, w:840, h:560 }));

      svg.addEventListener('wheel', event => {
        event.preventDefault();
        const bounds = svg.getBoundingClientRect();
        const px = viewBox.x + ((event.clientX - bounds.left) / bounds.width) * viewBox.w;
        const py = viewBox.y + ((event.clientY - bounds.top) / bounds.height) * viewBox.h;
        const factor = event.deltaY > 0 ? 1.12 : 0.88;
        const width = Math.min(1100, Math.max(280, viewBox.w * factor));
        const height = width * (560 / 840);
        setViewBox({ x:px - ((event.clientX-bounds.left)/bounds.width)*width, y:py - ((event.clientY-bounds.top)/bounds.height)*height, w:width, h:height });
      }, { passive:false });

      let drag = null;
      svg.addEventListener('pointerdown', event => {
        if (event.target.closest('.node,.edge-hit')) return;
        drag = { x:event.clientX, y:event.clientY, box:{...viewBox} };
        svg.setPointerCapture(event.pointerId);
      });
      svg.addEventListener('pointermove', event => {
        if (!drag) return;
        const bounds = svg.getBoundingClientRect();
        setViewBox({
          x:drag.box.x - (event.clientX-drag.x) / bounds.width * drag.box.w,
          y:drag.box.y - (event.clientY-drag.y) / bounds.height * drag.box.h,
          w:drag.box.w,
          h:drag.box.h
        });
      });
      svg.addEventListener('pointerup', () => { drag = null; });
      svg.addEventListener('pointercancel', () => { drag = null; });

      openButton.addEventListener('click', async () => {
        if (!openButton.dataset.path) return;
        const absolutePath = `${basePath}${openButton.dataset.path}`;
        const line = Number(openButton.dataset.line || 1);
        if (window.openai?.sendFollowUpMessage) {
          await window.openai.sendFollowUpMessage({
            title:`Inspect ${detailTitle.textContent}`,
            prompt:`Open ${absolutePath}:${line}. Explain this selected system/component interaction using exact source evidence, including callers, callees, execution style, side effects, and whether the map omits any runtime path.`
          });
        } else {
          detailSource.textContent = `${absolutePath}:${line}`;
        }
      });

      render();
    })();
  </script>
</div>
